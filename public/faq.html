            <div class="faq-item">
                <div class="faq-question"><i class="fa-solid fa-q"></i> 변환이 실패합니다. 어떻게 해야 하나요?</div>
                <div class="faq-answer">
                    노션 페이지 우측 상단의 '공유' 설정에서 '게시(웹에서 게시)'가 활성화되어 있는지 확인해 주세요. 비공개 페이지는 변환할 수 없습니다.
                </div>
            </div>

            <div class="faq-item">
                <div class="faq-question"><i class="fa-solid fa-q"></i> 단일 페이지와 A4 규격의 차이가 무엇인가요?</div>
                <div class="faq-answer">
                    단일 페이지는 내용의 길이에 맞춰 하나의 긴 PDF로 저장되어 웹에서 읽기 적합하며, A4 규격은 인쇄를 목적으로 페이지를 나누어 저장합니다.
