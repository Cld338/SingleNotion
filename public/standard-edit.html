<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Notion | 표준 규격 편집기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="standard-edit.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header class="editor-header">
        <div class="logo">
            <i class="fa-solid fa-file-pdf" style="color: #6366f1;"></i>
            <strong style="margin-left: 8px;">Standard Editor</strong>
        </div>
        <div class="actions">
            <span id="format-badge" class="badge">A4</span>
            <button id="generate-btn" class="submit-btn" style="padding: 8px 16px; font-size: 14px;">
                PDF 생성하기
            </button>
        </div>
    </header>

    <div class="main-container">
        <div id="notion-viewer">
            <div id="loading-spinner" class="loading-overlay">
                <div class="spinner"></div>
                <p style="margin-left: 15px;">노션 데이터를 불러오는 중...</p>
            </div>
            <div id="content-area" style="display: none;">
            </div>
        </div>

        <aside class="sidebar">
            <h3>페이지 설정</h3>
            <p class="text-muted" style="font-size: 13px; margin-bottom: 1rem;">
                문서의 블록을 클릭하여 페이지가 나뉠 지점을 선택하세요. 선택된 블록 <b>이후</b>부터 새로운 페이지가 시작됩니다.
            </p>
            <div id="break-list">
                <p style="font-size: 14px; color: #94a3b8;">설정된 분할 지점이 없습니다.</p>
            </div>
        </aside>
    </div>

    <!-- External JavaScript Files -->
    <script src="standard-edit-logger.js"></script>
    <script src="standard-edit-utils.js"></script>
    <script src="standard-edit-fonts.js"></script>
    <script src="standard-edit-app.js"></script>
</body>
</html>
