                <div class="converter-card fade-in-up">

                        <div class="input-label">노션 페이지 주소</div>
                        <div class="input-group">
                            <i class="fa-solid fa-link"></i>
                            <input type="text" id="url" name="url" placeholder="https://www.notion.so/..." required>
                        </div>
                        <button type="submit" id="submitBtn" class="main-btn">

    <script>
        document.getElementById('convertForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            let rawUrl = formData.get('url').trim();

            try {
                const urlObj = new URL(rawUrl);
                rawUrl = `${urlObj.origin}${urlObj.pathname}`;
            } catch (e) {
                alert('올바른 URL 형식이 아닙니다.');
                return;
            }

            // 부가 옵션 없이 URL 파라미터만 담아서 standard-edit 페이지로 바로 이동
            const params = new URLSearchParams({
                url: rawUrl
            });

            window.location.href = `standard-edit.html?${params.toString()}`;
        });
    </script>
