<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Single Notion | 노션 페이지를 끊김 없는 단일 페이지 PDF로</title>
    <meta name="description" content="여러 장으로 나뉘는 불편함 없이 노션 페이지를 하나의 매끄러운 PDF로 변환하세요. 제목, 배너, 속성 선택 등 맞춤형 옵션을 제공합니다.">
    <meta name="keywords" content="노션, Notion, PDF 변환, 노션 PDF 저장, Single Notion, 노션 단일 페이지">
    <link rel="canonical" href="https://notion-pdf.cld338.me"> <meta property="og:type" content="website">
    <meta property="og:title" content="Single Notion - 노션을 끊김없는 PDF로">
    <meta property="og:description" content="노션 페이지를 끊김없는 한 페이지 PDF로 깔끔하게 저장하는 가장 쉬운 방법">
    <meta property="og:image" content="https://notion-pdf.cld338.me/og-image.png"> <meta property="og:url" content="https://notion-pdf.cld338.me">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Single Notion">
    <meta name="twitter:description" content="노션 페이지를 단일 PDF 파일로 즉시 변환하세요.">
    <meta name="twitter:image" content="https://notion-pdf.cld338.me/og-image.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Single Notion",
      "url": "https://notion-pdf.cld338.me",
      "description": "노션 페이지를 끊김 없는 단일 페이지 PDF로 변환해주는 웹 서비스",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "All",
      "featureList": "단일 페이지 변환, 맞춤형 옵션(제목/배너/속성)"
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <meta name="google-site-verification" content="4xXtEZual4VKfcnvtGUPBjMf0bJtj9OTbmUYVQLnDXI" />
    
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <i class="fa-solid fa-file-pdf"></i> Single Notion
            </a>
        </div>
    </nav>

    <main class="main-content">
        <header class="hero">
            <div class="container fade-in">
                <h1 class="title">노션 페이지를<br><span>끊김없는 PDF</span>로</h1>
                <p class="subtitle">여러 장으로 나뉘는 불편함 없이, 하나의 페이지로 깔끔하게 저장합니다.</p>
                
                <div class="converter-card fade-in-up">
                    <form id="convertForm">
                        <div class="input-label">노션 페이지 주소</div>
                        <div class="input-group">
                            <i class="fa-solid fa-link"></i>
                            <input type="text" id="url" name="url" placeholder="https://www.notion.so/..." required>
                        </div>
                        <div class="form-group">
                        <label>출력 모드 선택</label>
                        <div class="mode-selection">
                            <label class="mode-option">
                                <input type="radio" name="mode" value="single" checked>
                                <div class="mode-label">
                                    <i class="fa-solid fa-scroll"></i>
                                    <span>단일 페이지</span>
                                </div>
                            </label>
                            <label class="mode-option">
                                <input type="radio" name="mode" value="standard">
                                <div class="mode-label">
                                    <i class="fa-solid fa-file-lines"></i>
                                    <span>표준 규격</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div id="standardOptions" style="display: none;">
                        <label for="format">용지 규격</label>
                        <select id="format" name="format" class="select-styled">
                            <option value="A4">A4 (210 x 297mm)</option>
                            <option value="A3">A3 (297 x 420mm)</option>
                            <option value="B5">B5 (176 x 250mm)</option>
                            <option value="Letter">Letter (8.5 x 11in)</option>
                        </select>
                    </div>
                        
                        <div class="input-label">PDF 설정</div>
                        <div class="options-group">
                            <label class="option-chip">
                                <input type="checkbox" name="includeTitle" value="true" checked>
                                <span class="chip-content">
                                    <i class="fa-solid fa-heading"></i> 제목
                                </span>
                            </label>
                            <label class="option-chip">
                                <input type="checkbox" name="includeBanner" value="true" checked>
                                <span class="chip-content">
                                    <i class="fa-solid fa-image"></i> 배너
                                </span>
                            </label>
                            <label class="option-chip">
                                <input type="checkbox" name="includeTags" value="true" checked>
                                <span class="chip-content">
                                    <i class="fa-solid fa-tags"></i> 속성
                                </span>
                            </label>
                        </div>
                        
                        <button type="submit" id="submitBtn" class="main-btn">
                            <span>PDF 변환하기</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </div>
        </header>

        <section id="how-it-works" class="features">
            <div class="container">
                <h2 class="section-title">3초 만에 끝내는 방법</h2>
                <div class="feature-grid">
                    <div class="feature-item fade-in-up">
                        <div class="icon-box"><i class="fa-solid fa-share-nodes"></i></div>
                        <h3>1. 링크 공유</h3>
                        <p>노션 우측 상단 '공유'에서<br>웹 게시를 활성화하세요.</p>
                    </div>
                    <div class="feature-item fade-in-up" style="animation-delay: 0.1s;">
                        <div class="icon-box"><i class="fa-solid fa-copy"></i></div>
                        <h3>2. URL 복사</h3>
                        <p>공유 가능한 페이지의<br>URL을 복사해 입력하세요.</p>
                    </div>
                    <div class="feature-item fade-in-up" style="animation-delay: 0.2s;">
                        <div class="icon-box"><i class="fa-solid fa-file-arrow-down"></i></div>
                        <h3>3. PDF 다운로드</h3>
                        <p>변환 버튼을 누르면<br>즉시 다운로드가 시작됩니다.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Single Notion.</p>
            <!-- <a href="https://www.threads.net/@oh_my.dev" target="_blank" class="badge-link">
                <img alt="Threads" src="https://img.shields.io/badge/Threads-000000?style=flat-square&logo=threads&logoColor=white">
            </a> -->
        </div>
    </footer>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loader-content">
            <div class="spinner"></div>
            <p class="loading-text">PDF를 생성하는 중입니다...</p>
            <p class="loading-subtext">잠시만 기다려 주세요 (최대 2분 소요)</p>
        </div>
    </div>

    <script>
        // 모드 선택에 따른 옵션 창 노출 제어
        const modeRadios = document.querySelectorAll('input[name="mode"]');
        const standardOptions = document.getElementById('standardOptions');

        modeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'standard') {
                    standardOptions.style.display = 'block';
                } else {
                    standardOptions.style.display = 'none';
                }
            });
        });

        document.getElementById('convertForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            let rawUrl = formData.get('url').trim();
            const mode = formData.get('mode');

            try {
                const urlObj = new URL(rawUrl);
                rawUrl = `${urlObj.origin}${urlObj.pathname}`;
            } catch (e) {
                alert('올바른 URL 형식이 아닙니다.');
                return;
            }

            const params = new URLSearchParams({
                url: rawUrl,
                includeTitle: formData.get('includeTitle') === 'true',
                includeBanner: formData.get('includeBanner') === 'true',
                includeTags: formData.get('includeTags') === 'true'
            });

            if (mode === 'single') {
                window.location.href = `edit.html?${params.toString()}`;
            } else {
                params.append('format', formData.get('format'));
                window.location.href = `standard-edit.html?${params.toString()}`;
            }
        });
    </script>
</body>
</html>
