<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Notion | 노션을 완벽한 PDF로</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <i class="fa-solid fa-file-pdf"></i> Single Notion
            </a>
        </div>
    </nav>

    <main class="main-content">
        <header class="hero">
            <div class="container fade-in">
                <h1 class="title">노션 페이지를<br><span>끊김없는 PDF</span>로</h1>
                <p class="subtitle">여러 장으로 나뉘는 불편함 없이, 하나의 페이지로 깔끔하게 저장합니다.</p>
                
                <div class="converter-card fade-in-up">
                    <form id="convertForm">
                        <div class="input-label">노션 페이지 주소</div>
                        <div class="input-group">
                            <i class="fa-solid fa-link"></i>
                            <input type="text" id="url" name="url" placeholder="https://www.notion.so/..." required>
                        </div>
                        
                        <div class="input-label">PDF 설정</div>
                        <div class="options-group">
                            <label class="option-chip">
                                <input type="checkbox" name="includeTitle" value="true" checked>
                                <span class="chip-content">
                                    <i class="fa-solid fa-heading"></i> 제목
                                </span>
                            </label>
                            <label class="option-chip">
                                <input type="checkbox" name="includeBanner" value="true" checked>
                                <span class="chip-content">
                                    <i class="fa-solid fa-image"></i> 배너
                                </span>
                            </label>
                            <label class="option-chip">
                                <input type="checkbox" name="includeTags" value="true" checked>
                                <span class="chip-content">
                                    <i class="fa-solid fa-tags"></i> 속성
                                </span>
                            </label>
                        </div>
                        
                        <button type="submit" id="submitBtn" class="main-btn">
                            <span>무료로 PDF 변환하기</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </div>
        </header>

        <section id="how-it-works" class="features">
            <div class="container">
                <h2 class="section-title">3초 만에 끝내는 방법</h2>
                <div class="feature-grid">
                    <div class="feature-item fade-in-up">
                        <div class="icon-box"><i class="fa-solid fa-share-nodes"></i></div>
                        <h3>1. 링크 공유</h3>
                        <p>노션 우측 상단 '공유'에서<br>웹 게시를 활성화하세요.</p>
                    </div>
                    <div class="feature-item fade-in-up" style="animation-delay: 0.1s;">
                        <div class="icon-box"><i class="fa-solid fa-copy"></i></div>
                        <h3>2. URL 복사</h3>
                        <p>공유 가능한 페이지의<br>URL을 복사해 입력하세요.</p>
                    </div>
                    <div class="feature-item fade-in-up" style="animation-delay: 0.2s;">
                        <div class="icon-box"><i class="fa-solid fa-file-arrow-down"></i></div>
                        <h3>3. PDF 다운로드</h3>
                        <p>변환 버튼을 누르면<br>즉시 다운로드가 시작됩니다.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Single Notion.</p>
            <a href="https://www.threads.net/@oh_my.dev" target="_blank" class="badge-link">
                <img alt="Threads" src="https://img.shields.io/badge/Threads-000000?style=flat-square&logo=threads&logoColor=white">
            </a>
        </div>
    </footer>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loader-content">
            <div class="spinner"></div>
            <p class="loading-text">PDF를 생성하는 중입니다...</p>
            <p class="loading-subtext">잠시만 기다려 주세요 (최대 2분 소요)</p>
        </div>
    </div>

    <script>
        document.getElementById('convertForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.querySelector('.loading-text');
            
            submitBtn.disabled = true;
            loadingOverlay.style.display = 'flex';
            loadingText.innerHTML = '대기열에 등록 중입니다...';

            const formData = new FormData(this);
            let rawUrl = formData.get('url').trim();

            try {
                const urlObj = new URL(rawUrl);
                rawUrl = `${urlObj.origin}${urlObj.pathname}`;
            } catch (e) {
                alert('올바른 URL 형식이 아닙니다.');
                resetUI();
                return;
            }

            const data = {
                url: rawUrl, 
                includeTitle: formData.get('includeTitle') === 'true',
                includeBanner: formData.get('includeBanner') === 'true',
                includeTags: formData.get('includeTags') === 'true'
            };

            try {
                const response = await fetch('/convert-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const resData = await response.json();
                if (!response.ok) throw new Error(resData.error || '요청 실패');

                const jobId = resData.jobId;
                loadingText.innerHTML = 'PDF를 굽는 중입니다...';

                const eventSource = new EventSource(`/job-events/${jobId}`);

                eventSource.onmessage = function(event) {
                    const statusData = JSON.parse(event.data);
                    if (statusData.status === 'completed') {
                        eventSource.close(); 
                        const a = document.createElement('a');
                        a.href = statusData.result.downloadUrl;
                        a.download = statusData.result.fileName;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        resetUI();
                    } else if (statusData.status === 'failed' || statusData.status === 'error') {
                        eventSource.close(); 
                        alert(`오류 발생: ${statusData.error || '변환 실패'}`);
                        resetUI();
                    }
                };

                eventSource.onerror = () => { 
                    eventSource.close(); 
                    alert('서버와의 연결이 끊어졌습니다.');
                    resetUI(); 
                };

            } catch (error) {
                alert(`오류 발생: ${error.message}`);
                resetUI();
            }

            function resetUI() {
                submitBtn.disabled = false;
                loadingOverlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
