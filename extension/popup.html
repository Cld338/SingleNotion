<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion to PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 350px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: white;
            color: #333;
        }

        .container {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #1a202c;
        }

        .header p {
            font-size: 13px;
            color: #718096;
            margin-top: 4px;
            line-height: 1.4;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status-box {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .status-box.info {
            background: #e6f3ff;
            color: #0056b3;
            display: flex;
        }

        .status-box.success {
            background: #d4edda;
            color: #155724;
            display: flex;
        }

        .status-box.error {
            background: #f8d7da;
            color: #721c24;
            display: flex;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #0056b3;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #0056b3;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #004085;
            box-shadow: 0 2px 8px rgba(0, 86, 179, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            background: #003060;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #cbd5e0;
        }

        .info-text {
            font-size: 12px;
            color: #718096;
            line-height: 1.5;
            margin-top: 8px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Notion to PDF</h1>
            <p>현재 페이지를 PDF로 변환하세요</p>
        </div>

        <div class="content">
            <div id="status-box" class="status-box"></div>

            <div class="button-group">
                <button id="capture-btn" class="btn-primary">
                    캡처 & 전송
                </button>
                <button id="settings-btn" class="btn-secondary">
                    설정
                </button>
            </div>

            <div class="info-text">
                💡 Notion 페이지의 콘텐츠를 캡처하여 서버로 전송하면, 편집 화면에서 바로 PDF로 변환할 수 있습니다.
            </div>
            
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #e0e0e0;">
                <details style="font-size: 11px; color: #666;">
                    <summary style="cursor: pointer; color: #0056b3; margin-bottom: 8px;">🔍 디버그 정보 보기</summary>
                    <div id="debug-logs" style="background: #f5f5f5; padding: 8px; border-radius: 4px; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 10px; line-height: 1.3; white-space: pre-wrap; word-wrap: break-word;"></div>
                </details>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
